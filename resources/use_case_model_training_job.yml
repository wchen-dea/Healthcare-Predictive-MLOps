resources:
  jobs:
    use_case_model_training_job:
      name: "Healthcare - Use-Case Model Training (Dual Algorithm)"
      description: "Trains and evaluates Random Forest and Gradient Boosting for both batch and realtime use-case models, promoting the best per use case to champion."
      tags:
        project: healthcare-predictive-mlops
        stage: model-training
        environment: ${bundle.target}
      job_clusters:
      - job_cluster_key: use_case_training_cluster
        new_cluster:
          policy_id: ${var.policy_id}
          apply_policy_default_values: true
          aws_attributes:
            instance_profile_arn: ${var.instance_profile_arn}
            first_on_demand: 1
          spark_version: 17.3.x-scala2.13
          node_type_id: r5d.2xlarge
          data_security_mode: SINGLE_USER
          autoscale:
            min_workers: 1
            max_workers: 6
          custom_tags:
            type: complex
            Function: PDM
            JobType: BATCH
      tasks:
      - task_key: train_dual_algorithms_for_use_cases
        description: "Train/evaluate Random Forest + Gradient Boosting for batch and realtime model registries"
        job_cluster_key: use_case_training_cluster
        notebook_task:
          notebook_path: ${workspace.file_path}/notebooks/03_use_case_dual_algo_training
          base_parameters:
            catalog: ${var.catalog}
            schema: ${var.schema}
            batch_model_name: ${var.catalog}.${var.schema}.test_result_classifier_batch
            realtime_model_name: ${var.catalog}.${var.schema}.test_result_classifier_realtime
            experiment_root: /Shared/healthcare-predictive-mlops/${bundle.target}/use-case-models
            algorithms: random_forest,gradient_boosting
            min_accuracy_threshold: "0.75"
            compare_champion: "true"
            n_estimators: "200"
            max_depth: "10"
      schedule:
        quartz_cron_expression: "0 0 4 ? * SUN"
        timezone_id: UTC
        pause_status: PAUSED
      email_notifications:
        on_failure:
        - ${bundle.target}-alerts@example.com
        on_success:
        - ${bundle.target}-alerts@example.com